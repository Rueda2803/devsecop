name: CI/CD DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ------------------------------------------------------------
  # JOB 1: Análisis Estático (SAST) - Semgrep
  # ------------------------------------------------------------
  semgrep-security:
    runs-on: ubuntu-latest
    name: "Semgrep SAST Scan"
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # Ejecutamos Semgrep usando una acción oficial.
    # Usaremos las reglas por defecto (p/security-audit) que buscan secretos.
    - name: Run Semgrep
      uses: returntocorp/semgrep-action@v1
      with:
        config: p/security-audit
        # Le decimos a Semgrep que ANALICE pero no bloquee (para ver el resultado primero).
        # En producción, usarías 'fail-on: always' para bloquear.
        auditOn: true

  # ------------------------------------------------------------
  # JOB 2: Escaneo de Imagen y Contenedores (SCA/IaC) - Trivy
  # ------------------------------------------------------------
  trivy-security:
    needs: semgrep-security # Este job solo corre si el anterior termina
    runs-on: ubuntu-latest
    name: "Trivy Container & IaC Scan"
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # Paso 1: Construir la imagen de Docker (como lo hicimos localmente)
    - name: Build Docker Image
      run: |
        docker build -t mi-app-flask:latest .

    # Paso 2: Ejecutar Trivy para escanear la imagen recién construida
    - name: Run Trivy (Docker Image Scan)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'mi-app-flask:latest'
        format: 'table'
        # Buscaremos vulnerabilidades CRÍTICAS y ALTAS para reportar, pero sin fallar el pipeline aún.
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    # Paso 3: Ejecutar Trivy para escanear configuraciones (misconfigurations)
    - name: Run Trivy (IaC / Config Scan)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config' # Escanea el Dockerfile y docker-compose.yml
        format: 'table'
        exit-code: '0'
